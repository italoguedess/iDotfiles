[colors]
background = #272e33
background-alt = #2e383c
foreground = #d3c6aa
primary = #e69875
secondary = #dbbc7f
alert = #e67e80

orange = #e69875
aqua = #83c092
purple = #d699b6
blue = #7fbbb3
green = #a7c080
yellow = #dbbc7f
red = #e67e80

disabled = #7a8478

[bar/example]
width = 100%
height = 30pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
; border-color = #00000000

padding-top = 2
padding-left = 2
padding-right = 2
padding-bottom = 2

module-margin = 1

; separator = |
; separator-foreground = ${colors.disabled}

; font-0 = JetBrains Mono;2
font-0 = "JetBrainsMonoNerdFont:size=11;0"
font-1 = "JetBrainsMonoNerdFont:size=11:weight=bold;0"

modules-left = xworkspaces 
modules-center = 
modules-right = timer battery memory cpu system-bluetooth-bluetoothctl wlan pulseaudio date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %{T2}%name%%{T-}
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.primary}
; label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false

format-volume = <ramp-volume>  <label-volume>
format-volume-foreground = ${colors.aqua}

; format-volume-prefix = "VOL "
; format-volume-prefix-foreground = ${colors.primary}
; format-volume = <label-volume>

label-volume = %percentage:02%%

format-muted = ÓĽ®  <label-muted>
format-muted-foreground = ${colors.aqua}
label-muted = muted

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

click-right = cinnamon-settings sound

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/timer]
type=custom/script

exec = ~/.config/polybar/scripts/timer.sh
tail = true
click-left = ~/.config/polybar/scripts/timer.sh --toggle &
click-middle = ~/.config/polybar/scripts/timer.sh --hard-reset &
click-right = ~/.config/polybar/scripts/timer.sh --soft-reset &
format-foreground = ${colors.orange}
interval = 1

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging = <animation-charging>  <label-charging>
format-charging-foreground = ${colors.purple}

format-discharging = <ramp-capacity>  <label-discharging>
format-discharging-foreground = ${colors.purple}

format-full = ůįĀĻ <label-full>
format-full-foreground = ${colors.purple}

format-low = ůįĀļ  <label-low>
format-low-foreground = ${colors.purple}

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Fully charged
label-low = BATTERY LOW

ramp-capacity-0 = ůįĀĽ
ramp-capacity-1 = ůįĀĹ
ramp-capacity-2 = ůįĀŅ
ramp-capacity-3 = ůįāĀ
ramp-capacity-4 = ůįĀĻ

animation-charging-0 = ůįĘú
animation-charging-1 = ůįāá
animation-charging-2 = ůįĘĚ
animation-charging-3 = ůįĘě
animation-charging-4 = ůįāÖ

[module/memory]
type = internal/memory
interval = 2
format = ÓŅÖ  <label>
format-foreground = ${colors.green}
label = %{A1:gnome-system-monitor:}%percentage_used:02%%%{A}

[module/cpu]
type = internal/cpu
interval = 2
format = Ôíľ  <label>
format-foreground = ${colors.yellow}
label = %{A1:gnome-system-monitor:}%percentage:02%%%{A}

[module/system-bluetooth-bluetoothctl]
type = custom/script
exec = ~/.config/polybar/scripts/system-bluetooth-bluetoothctl.sh
tail = true
click-left = ~/.config/polybar/scripts/system-bluetooth-bluetoothctl.sh --toggle & 
click-right = ~/.config/polybar/scripts/system-bluetooth-bluetoothctl.sh --manager & 
format-foreground = ${colors.red}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
type = internal/network
interface-type = wireless
; label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %{A1:alacritty --class float-term -e nmtui:}%essid%%{A}
label-disconnected = disconnected

format-connected = <ramp-signal>  <label-connected>
format-connected-foreground = ${colors.blue}

format-disconnected = ůį§≠  <label-disconnected>
format-disconnected-foreground = ${colors.blue}

ramp-signal-0 = ůį§ę
ramp-signal-1 = ůį§Į
ramp-signal-2 = ůį§ü
ramp-signal-3 = ůį§Ę
ramp-signal-4 = ůį§•
ramp-signal-5 = ůį§®

[module/network-networkmanager]
type = custom/script
exec = ~/.config/polybar/scripts/network-networkmanager.sh
tail = true

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %d/%m/%Y %H:%M:%S

format = ůį•Ē  <label>
format-foreground = ${colors.primary}

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
